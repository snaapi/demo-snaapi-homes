<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snaapi Homes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#fefce8",
                100: "#fef9c3",
                200: "#fef08a",
                400: "#facc15",
                500: "#eab308",
                600: "#ca8a04",
                700: "#a16207",
              },
            },
          },
        },
      };
    </script>
    <style>
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(100%);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes fadeOut {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
          transform: translateY(-8px);
        }
      }
      .event-enter {
        animation: slideIn 0.25s ease-out;
      }
      .event-exit {
        animation: fadeOut 0.3s ease-out forwards;
      }
      .skeleton {
        background: linear-gradient(
          90deg,
          #e5e7eb 25%,
          #f3f4f6 50%,
          #e5e7eb 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
    </style>
  </head>
  <body class="bg-gray-50 text-slate-800 min-h-screen flex flex-col">
    <script>
      const API_BASE = "__API_BASE__";

      const state = {
        apiKey: localStorage.getItem("snaapi_homes_key") || "",
        userName: localStorage.getItem("snaapi_homes_user") || "",
        connected: false,
        properties: [],
        favorites: new Map(),
        total: 0,
        perPage: 20,
        page: 1,
        loading: true,
        events: [],
        sseAbort: null,
        loginError: "",
        loginLoading: false,
        showFavoritesOnly: false,
      };

      // --- Helpers ---

      function $(id) {
        return document.getElementById(id);
      }

      function fmt(price) {
        return "$" + Number(price).toLocaleString("en-US");
      }

      function headers(auth = false) {
        const h = { "Content-Type": "application/json" };
        if (auth && state.apiKey) {
          h["Authorization"] = `Bearer ${state.apiKey}`;
        }
        return h;
      }

      function timeSince(date) {
        const s = Math.floor((Date.now() - date) / 1000);
        if (s < 60) return "just now";
        if (s < 3600) return Math.floor(s / 60) + "m ago";
        return Math.floor(s / 3600) + "h ago";
      }

      // --- API ---

      async function fetchProperties() {
        if (!state.properties.length) {
          state.loading = true;
          renderGrid();
        }

        const params = new URLSearchParams();
        params.set("_sort", "-price");
        params.set("_limit", String(state.perPage));
        params.set("_offset", String((state.page - 1) * state.perPage));

        const minPrice = $("filter-min")?.value;
        const maxPrice = $("filter-max")?.value;
        const beds = $("filter-beds")?.value;
        const city = $("filter-city")?.value;
        const status = $("filter-status")?.value;

        if (minPrice) params.set("price__gte", minPrice);
        if (maxPrice) params.set("price__lte", maxPrice);
        if (beds) params.set("bedrooms__gte", beds);
        if (city) params.set("city__ilike", `%${city}%`);
        if (status) params.set("status__eq", status);

        const types = [];
        document.querySelectorAll(".filter-type:checked").forEach(
          (cb) => types.push(cb.value),
        );
        if (types.length === 1) {
          params.set("property_type__eq", types[0]);
        } else if (types.length > 1) {
          params.set("property_type__in", JSON.stringify(types));
        }

        if (state.showFavoritesOnly) {
          const favIds = [...state.favorites.keys()];
          if (favIds.length === 0) {
            state.properties = [];
            state.total = 0;
            state.loading = false;
            renderGrid();
            renderCount();
            return;
          }
          params.set("id__in", JSON.stringify(favIds));
        }

        try {
          const res = await fetch(
            `${API_BASE}/v1/properties?${params}`,
            { headers: headers(!!state.apiKey) },
          );
          const json = await res.json();
          state.properties = json.data || [];
          state.total = json.meta?.total ?? state.properties.length;
        } catch (e) {
          state.properties = [];
          state.total = 0;
        }

        state.loading = false;
        renderGrid();
        renderCount();
      }

      async function loadFavorites() {
        if (!state.apiKey) return;
        try {
          const res = await fetch(
            `${API_BASE}/v1/favorites?include=property`,
            { headers: headers(true) },
          );
          if (!res.ok) return;
          const json = await res.json();
          state.favorites.clear();
          (json.data || []).forEach((f) =>
            state.favorites.set(f.attributes.property_id, f.id)
          );
        } catch {}
        renderAuth();
        renderGrid();
      }

      async function toggleFavorite(propertyId) {
        if (!state.apiKey) return;
        if (state.favorites.has(propertyId)) {
          const favId = state.favorites.get(propertyId);
          await fetch(`${API_BASE}/v1/favorites/${favId}`, {
            method: "DELETE",
            headers: headers(true),
          });
          state.favorites.delete(propertyId);
        } else {
          const res = await fetch(`${API_BASE}/v1/favorites`, {
            method: "POST",
            headers: headers(true),
            body: JSON.stringify({ property_id: propertyId }),
          });
          if (res.ok) {
            const json = await res.json();
            state.favorites.set(propertyId, json.data.id);
          }
        }
        renderAuth();
        if (state.showFavoritesOnly) {
          fetchProperties();
        } else {
          renderGrid();
        }
      }

      function toggleFavoritesFilter() {
        state.showFavoritesOnly = !state.showFavoritesOnly;
        state.page = 1;
        fetchProperties();
        renderAuth();
      }

      // --- SSE ---

      function connectSSE() {
        if (state.sseAbort) state.sseAbort.abort();
        if (!state.apiKey) return;

        const ctrl = new AbortController();
        state.sseAbort = ctrl;

        console.log("[SSE] Connecting to properties stream...");
        fetch(
          `${API_BASE}/v1/properties/stream?events=created,updated`,
          {
            headers: { "Authorization": `Bearer ${state.apiKey}` },
            signal: ctrl.signal,
          },
        ).then((res) => {
          if (!res.ok) {
            console.error(
              "[SSE] Connection failed:",
              res.status,
              res.statusText,
            );
            return res.text().then((t) =>
              console.error("[SSE] Response:", t)
            );
          }
          if (!res.body) {
            console.error("[SSE] No response body");
            return;
          }
          console.log("[SSE] Connected, reading stream...");
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          function read() {
            reader.read().then(({ done, value }) => {
              if (done) {
                console.log("[SSE] Stream ended");
                return;
              }
              buffer += decoder.decode(value, { stream: true });
              const parts = buffer.split("\n\n");
              buffer = parts.pop();

              parts.forEach((block) => {
                let eventType = "", data = "";
                block.split("\n").forEach((line) => {
                  if (line.startsWith("event:")) {
                    eventType = line.slice(6).trim();
                  }
                  if (line.startsWith("data:")) {
                    data = line.slice(5).trim();
                  }
                });
                if (eventType && data) {
                  console.log("[SSE] Event:", eventType);
                  try {
                    const parsed = JSON.parse(data);
                    addEvent(eventType, parsed);
                  } catch (e) {
                    console.error("[SSE] Parse error:", e);
                  }
                }
              });
              read();
            }).catch((e) => {
              if (e.name !== "AbortError") {
                console.error("[SSE] Read error:", e);
              }
            });
          }
          read();
        }).catch((e) => {
          if (e.name !== "AbortError") {
            console.error("[SSE] Fetch error:", e);
          }
        });
      }

      function addEvent(type, payload) {
        const rec = payload.new || payload.old || {};
        const label = type.includes("created")
          ? "New"
          : type.includes("updated")
          ? "Updated"
          : "Sold";
        const ev = {
          id: Date.now() + Math.random(),
          label,
          title: rec.title || "Property",
          price: rec.price,
          time: new Date(),
        };

        state.events.unshift(ev);
        if (state.events.length > 5) {
          state.events = state.events.slice(0, 5);
        }
        renderEvents();

        setTimeout(() => {
          const el = document.querySelector(
            `[data-event-id="${ev.id}"]`,
          );
          if (el) {
            el.classList.add("event-exit");
            el.addEventListener("animationend", () => {
              state.events = state.events.filter((e) => e.id !== ev.id);
              renderEvents();
            });
          }
        }, 10000);

        if (type.includes("created") || type.includes("updated")) {
          fetchProperties();
        }
      }

      // --- Auth ---

      async function login() {
        const email = $("login-email").value.trim();
        const password = $("login-password").value.trim();
        if (!email || !password) return;

        state.loginError = "";
        state.loginLoading = true;
        renderAuth();

        try {
          const res = await fetch(`${API_BASE}/api/auth/token`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            state.loginError = err.message ||
              "Invalid email or password";
            state.loginLoading = false;
            renderAuth();
            return;
          }

          const data = await res.json();
          const token = data.token;
          const name = data.user?.name || data.user?.email || email;

          state.apiKey = token;
          state.userName = name;
          state.connected = true;
          state.loginLoading = false;
          state.loginError = "";
          localStorage.setItem("snaapi_homes_key", token);
          localStorage.setItem("snaapi_homes_user", name);
          renderAuth();
          loadFavorites();
          connectSSE();
          renderGrid();
        } catch (e) {
          state.loginError =
            "Connection failed. Is the server running?";
          state.loginLoading = false;
          renderAuth();
        }
      }

      function disconnect() {
        state.apiKey = "";
        state.userName = "";
        state.connected = false;
        state.favorites.clear();
        state.showFavoritesOnly = false;
        localStorage.removeItem("snaapi_homes_key");
        localStorage.removeItem("snaapi_homes_user");
        // Clear all cookies
        document.cookie.split(";").forEach((c) => {
          const name = c.split("=")[0].trim();
          document.cookie = name +
            "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
        });
        if (state.sseAbort) state.sseAbort.abort();
        state.sseAbort = null;
        state.events = [];
        renderAuth();
        renderGrid();
        renderEvents();
      }

      // --- Rendering ---

      function renderAuth() {
        if (state.connected) {
          const favCount = state.favorites.size;
          const favActive = state.showFavoritesOnly;
          $("auth-section").innerHTML =
            `<div class="flex items-center gap-3">
            <span class="flex items-center gap-1.5 text-sm text-slate-700">
              <span class="w-2 h-2 rounded-full bg-emerald-500 inline-block"></span>
              ${state.userName}
            </span>
            <button onclick="toggleFavoritesFilter()" class="flex items-center gap-1 px-2.5 py-1.5 rounded-lg text-sm transition-colors ${
              favActive
                ? "bg-red-50 text-red-600"
                : "text-slate-500 hover:text-red-500 hover:bg-slate-50"
            }" aria-label="Filter favorites">
              <svg class="w-4 h-4" fill="${
              favActive ? "currentColor" : "none"
            }" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
              <span class="font-medium">${favCount}</span>
            </button>
            <button onclick="disconnect()" class="text-sm text-slate-500 hover:text-slate-700 underline underline-offset-2">Sign out</button>
          </div>`;
        } else {
          const errHtml = state.loginError
            ? `<p class="text-xs text-red-500 mt-1">${state.loginError}</p>`
            : "";
          $("auth-section").innerHTML = `<div>
            <form onsubmit="event.preventDefault(); login();" class="flex items-center gap-2">
              <input id="login-email" type="email" placeholder="Email" required
                class="w-36 sm:w-44 px-3 py-1.5 text-sm border border-slate-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-400">
              <input id="login-password" type="password" placeholder="Password" required
                class="w-28 sm:w-36 px-3 py-1.5 text-sm border border-slate-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-400">
              <button type="submit" ${
            state.loginLoading ? "disabled" : ""
          }
                class="px-3.5 py-1.5 text-sm font-medium bg-amber-500 text-white rounded-lg hover:bg-amber-600 transition-colors disabled:opacity-50">
                ${state.loginLoading ? "Signing in..." : "Sign in"}
              </button>
            </form>
            ${errHtml}
          </div>`;
        }
      }

      function totalPages() {
        return Math.max(1, Math.ceil(state.total / state.perPage));
      }

      function goToPage(p) {
        state.page = Math.max(1, Math.min(p, totalPages()));
        fetchProperties();
      }

      function changePerPage(val) {
        state.perPage = Number(val);
        state.page = 1;
        fetchProperties();
      }

      function renderCount() {
        const tp = totalPages();
        const start = state.total === 0
          ? 0
          : (state.page - 1) * state.perPage + 1;
        const end = Math.min(state.page * state.perPage, state.total);
        $("results-count").innerHTML =
          `<div class="flex items-center justify-between">
          <span class="text-sm text-slate-500">${start}–${end} of ${state.total} propert${
            state.total === 1 ? "y" : "ies"
          }</span>
          <div class="flex items-center gap-3">
            <div class="flex items-center gap-1.5">
              <button onclick="goToPage(state.page - 1)" ${
            state.page <= 1 ? "disabled" : ""
          }
                class="h-8 w-8 flex items-center justify-center rounded-md border border-slate-200 text-sm text-slate-600 hover:bg-slate-50 disabled:opacity-30 disabled:pointer-events-none transition-colors">&lsaquo;</button>
              <span class="text-sm text-slate-600 px-1">${state.page} / ${tp}</span>
              <button onclick="goToPage(state.page + 1)" ${
            state.page >= tp ? "disabled" : ""
          }
                class="h-8 w-8 flex items-center justify-center rounded-md border border-slate-200 text-sm text-slate-600 hover:bg-slate-50 disabled:opacity-30 disabled:pointer-events-none transition-colors">&rsaquo;</button>
            </div>
          </div>
        </div>`;
      }

      function skeletonCard() {
        return `<div class="bg-white rounded-xl overflow-hidden border border-slate-100">
    <div class="skeleton h-48 w-full"></div>
    <div class="p-4 space-y-3">
      <div class="skeleton h-5 w-24 rounded"></div>
      <div class="skeleton h-4 w-full rounded"></div>
      <div class="skeleton h-4 w-3/4 rounded"></div>
    </div>
  </div>`;
      }

      function propertyCard(item) {
        const a = item.attributes;
        const isFav = state.favorites.has(item.id);
        const img = a.image_url
          ? `<img src="${a.image_url}" alt="${a.title}" class="w-full h-48 object-cover">`
          : `<div class="w-full h-48 bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center">
        <svg class="w-12 h-12 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
      </div>`;

        const statusBadge = a.status === "active"
          ? '<span class="text-xs font-medium px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-700">Active</span>'
          : a.status === "pending"
          ? '<span class="text-xs font-medium px-2 py-0.5 rounded-full bg-amber-50 text-amber-700">Pending</span>'
          : '<span class="text-xs font-medium px-2 py-0.5 rounded-full bg-slate-100 text-slate-600">Sold</span>';

        const heartBtn = state.connected
          ? `<button onclick="event.stopPropagation(); toggleFavorite('${item.id}')" class="absolute top-3 right-3 w-9 h-9 flex items-center justify-center rounded-full bg-white/90 hover:bg-white shadow-sm transition-colors" aria-label="Toggle favorite">
        <svg class="w-5 h-5 ${
            isFav ? "text-red-500 fill-red-500" : "text-slate-400"
          }" fill="${
            isFav ? "currentColor" : "none"
          }" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
      </button>`
          : "";

        return `<div class="bg-white rounded-xl overflow-hidden border border-slate-100 hover:shadow-md transition-shadow">
    <div class="relative">${img}${heartBtn}
      <div class="absolute bottom-3 left-3">${statusBadge}</div>
    </div>
    <div class="p-4">
      <p class="text-xl font-semibold text-slate-900">${
          fmt(a.price)
        }</p>
      <h3 class="mt-1 text-sm font-medium text-slate-700 truncate">${a.title}</h3>
      <div class="mt-2 flex items-center gap-3 text-xs text-slate-500">
        <span>${a.bedrooms} bd</span><span class="text-slate-300">|</span>
        <span>${a.bathrooms} ba</span><span class="text-slate-300">|</span>
        <span>${
          a.sqft ? a.sqft.toLocaleString() + " sqft" : "--"
        }</span>
      </div>
      <p class="mt-2 text-xs text-slate-500 truncate">${a.address}, ${a.city}, ${a.state} ${a.zip_code}</p>
      ${
          a.agent_name
            ? `<p class="mt-2 text-xs text-slate-400">${a.agent_name}</p>`
            : ""
        }
    </div>
  </div>`;
      }

      function renderGrid() {
        const grid = $("property-grid");
        if (!state.connected) {
          grid.innerHTML =
            `<div class="col-span-full py-20 text-center text-slate-400">Sign in to browse properties.</div>`;
          return;
        }
        if (state.loading) {
          grid.innerHTML = Array(6).fill(skeletonCard()).join("");
          return;
        }
        if (!state.properties.length) {
          const msg = state.showFavoritesOnly
            ? "No favorites match your current filters."
            : "No properties found. Try adjusting your filters.";
          grid.innerHTML =
            `<div class="col-span-full py-20 text-center text-slate-400">${msg}</div>`;
          return;
        }
        grid.innerHTML = state.properties.map(propertyCard).join("");
      }

      function renderEvents() {
        const container = $("event-feed");
        container.innerHTML = state.events.map((ev) => {
          const colors = ev.label === "New"
            ? "bg-emerald-500"
            : ev.label === "Updated"
            ? "bg-amber-500"
            : "bg-slate-500";
          return `<div data-event-id="${ev.id}" class="event-enter flex items-start gap-3 px-4 py-3 bg-white rounded-lg shadow-lg border border-slate-100 max-w-xs">
      <span class="shrink-0 mt-0.5 text-xs font-semibold text-white px-2 py-0.5 rounded ${colors}">${ev.label}</span>
      <div class="min-w-0">
        <p class="text-sm font-medium text-slate-800 truncate">${ev.title}</p>
        <p class="text-xs text-slate-500">${
            ev.price ? fmt(ev.price) : ""
          } &middot; ${timeSince(ev.time)}</p>
      </div>
    </div>`;
        }).join("");
      }

      // --- Init ---

      document.addEventListener("DOMContentLoaded", () => {
        if (state.apiKey) {
          state.connected = true;
          state.loading = true;
        } else {
          state.loading = false;
        }
        renderAuth();
        renderGrid();
        if (state.connected) {
          fetchProperties();
          loadFavorites();
          connectSSE();
        }
      });
    </script>

    <!-- Header -->
    <header class="bg-white border-b border-slate-100">
      <div
        class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between"
      >
        <div class="flex items-center gap-1.5">
          <svg
            style="height: 2.4rem"
            viewBox="0 0 1400 570"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              fill="none"
              stroke="#fbbf24"
              stroke-width="60"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M 105 338 L 315 338 L 105 518"
            />
            <path
              fill="none"
              stroke="#f59e0b"
              stroke-width="60"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M 315 53 L 105.000008 233 L 315 233"
            />
            <text
              x="420"
              y="379"
              font-family="Outfit, Inter, system-ui, sans-serif"
              font-size="288"
              font-weight="600"
              fill="#0f172a"
            >
              Snaapi
            </text>
          </svg>
          <span class="text-lg font-bold tracking-tight text-slate-900"
          >Homes</span>
        </div>
        <div id="auth-section"></div>
      </div>
    </header>

    <!-- Filters -->
    <div class="bg-white border-b border-slate-100">
      <form
        onsubmit="event.preventDefault(); state.page = 1; fetchProperties();"
        class="max-w-7xl mx-auto px-4 sm:px-6 py-2.5"
      >
        <div class="flex items-end gap-3">
          <div class="flex-1 min-w-0">
            <label class="block text-xs font-medium text-slate-500 mb-1"
            >Price min</label>
            <input
              id="filter-min"
              type="number"
              placeholder="0"
              class="w-full h-9 px-3 text-sm border border-slate-200 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-amber-400/40 focus:border-amber-400 transition-colors"
            >
          </div>
          <div class="flex-1 min-w-0">
            <label class="block text-xs font-medium text-slate-500 mb-1"
            >Price max</label>
            <input
              id="filter-max"
              type="number"
              placeholder="Any"
              class="w-full h-9 px-3 text-sm border border-slate-200 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-amber-400/40 focus:border-amber-400 transition-colors"
            >
          </div>
          <div class="shrink-0 w-16">
            <label class="block text-xs font-medium text-slate-500 mb-1"
            >Beds</label>
            <select
              id="filter-beds"
              class="w-full h-9 px-2 text-sm border border-slate-200 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-amber-400/40 focus:border-amber-400 transition-colors"
            >
              <option value="">Any</option>
              <option value="1">1+</option>
              <option value="2">2+</option>
              <option value="3">3+</option>
              <option value="4">4+</option>
            </select>
          </div>
          <div class="flex-2 min-w-0">
            <label class="block text-xs font-medium text-slate-500 mb-1"
            >Type</label>
            <div class="flex items-center gap-4 h-9">
              <label
                class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer whitespace-nowrap"
              >
                <input
                  type="checkbox"
                  value="house"
                  class="filter-type w-4 h-4 rounded border-slate-300 text-amber-500 focus:ring-amber-400/40"
                >House
              </label>
              <label
                class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer whitespace-nowrap"
              >
                <input
                  type="checkbox"
                  value="condo"
                  class="filter-type w-4 h-4 rounded border-slate-300 text-amber-500 focus:ring-amber-400/40"
                >Condo
              </label>
              <label
                class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer whitespace-nowrap"
              >
                <input
                  type="checkbox"
                  value="townhouse"
                  class="filter-type w-4 h-4 rounded border-slate-300 text-amber-500 focus:ring-amber-400/40"
                >Town
              </label>
              <label
                class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer whitespace-nowrap"
              >
                <input
                  type="checkbox"
                  value="apartment"
                  class="filter-type w-4 h-4 rounded border-slate-300 text-amber-500 focus:ring-amber-400/40"
                >Apt
              </label>
            </div>
          </div>
          <div class="flex-1 min-w-0">
            <label class="block text-xs font-medium text-slate-500 mb-1"
            >City</label>
            <input
              id="filter-city"
              type="text"
              placeholder="Search city"
              class="w-full h-9 px-3 text-sm border border-slate-200 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-amber-400/40 focus:border-amber-400 transition-colors"
            >
          </div>
          <div class="flex-1 min-w-0">
            <label class="block text-xs font-medium text-slate-500 mb-1"
            >Status</label>
            <select
              id="filter-status"
              class="w-full h-9 px-3 text-sm border border-slate-200 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-amber-400/40 focus:border-amber-400 transition-colors"
            >
              <option value="">Any</option>
              <option value="active" selected>Active</option>
              <option value="pending">Pending</option>
              <option value="sold">Sold</option>
            </select>
          </div>
          <div class="shrink-0 w-16">
            <label class="block text-xs font-medium text-slate-500 mb-1"
            >Per page</label>
            <select
              id="filter-perpage"
              onchange="changePerPage(this.value)"
              class="w-full h-9 px-2 text-sm border border-slate-200 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-amber-400/40 focus:border-amber-400 transition-colors"
            >
              <option value="5">5</option>
              <option value="10">10</option>
              <option value="20" selected>20</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>
          <div class="shrink-0">
            <button
              type="submit"
              class="h-9 px-5 text-sm font-medium bg-slate-800 text-white rounded-md hover:bg-slate-900 transition-colors whitespace-nowrap"
            >
              Search
            </button>
          </div>
        </div>
      </form>
    </div>

    <!-- Main -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 py-6">
      <p id="results-count" class="text-sm text-slate-500 mb-4"></p>
      <div
        id="property-grid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"
      >
      </div>
    </main>

    <!-- Event Feed -->
    <div
      id="event-feed"
      class="fixed bottom-4 right-4 flex flex-col gap-2 z-50 pointer-events-none [&>*]:pointer-events-auto"
    >
    </div>
  </body>
</html>
