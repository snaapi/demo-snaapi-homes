<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snaapi Homes — Real Estate Demo</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23f59e0b'><path d='M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z'/></svg>"
      type="image/svg+xml"
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&display=swap"
      rel="stylesheet"
    >
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Outfit", "system-ui", "sans-serif"],
            },
            colors: {
              brand: {
                50: "#fefce8",
                100: "#fef9c3",
                200: "#fef08a",
                400: "#facc15",
                500: "#eab308",
                600: "#ca8a04",
                700: "#a16207",
              },
            },
          },
        },
      };
    </script>
    <style>
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(100%);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes fadeOut {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
          transform: translateY(-8px);
        }
      }
      .event-enter {
        animation: slideIn 0.25s ease-out;
      }
      .event-exit {
        animation: fadeOut 0.3s ease-out forwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .card-enter {
        opacity: 0;
        animation: fadeIn 0.2s ease-out both;
      }
      @keyframes pulse-live {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .pulse-live {
        animation: pulse-live 2s ease-in-out infinite;
      }
      @keyframes heart-pop {
        0% {
          transform: scale(1);
        }
        30% {
          transform: scale(1.3);
        }
        100% {
          transform: scale(1);
        }
      }
      .heart-pop svg {
        animation: heart-pop 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      }
      .skeleton {
        background: linear-gradient(
          90deg,
          #e7e5e4 25%,
          #f5f5f4 50%,
          #e7e5e4 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .event-enter,
        .event-exit,
        .skeleton,
        .pulse-live,
        .heart-pop svg {
          animation: none !important;
        }
        .card-enter {
          animation: none !important;
          opacity: 1;
        }
        * {
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body class="bg-stone-50 text-stone-800 min-h-screen flex flex-col">
    <script>
      const API_BASE = "__API_BASE__";

      const state = {
        apiKey: localStorage.getItem("snaapi_homes_key") || "",
        userName: localStorage.getItem("snaapi_homes_user") || "",
        connected: false,
        properties: [],
        favorites: new Map(),
        total: 0,
        perPage: 20,
        page: 1,
        sort: "-price",
        loading: true,
        events: [],
        sseAbort: null,
        loginError: "",
        loginLoading: false,
        showFavoritesOnly: false,
      };

      // --- Helpers ---

      function $(id) {
        return document.getElementById(id);
      }

      const _escEl = document.createElement("span");
      function esc(str) {
        _escEl.textContent = str ?? "";
        return _escEl.innerHTML;
      }

      function fmt(price) {
        return "$" + Number(price).toLocaleString("en-US");
      }

      function headers(auth = false) {
        const h = { "Content-Type": "application/json" };
        if (auth && state.apiKey) {
          h["Authorization"] = `Bearer ${state.apiKey}`;
        }
        return h;
      }

      function timeSince(date) {
        const s = Math.floor((Date.now() - date) / 1000);
        if (s < 60) return "just now";
        if (s < 3600) return Math.floor(s / 60) + "m ago";
        return Math.floor(s / 3600) + "h ago";
      }

      function clearFilters() {
        ["filter-min", "filter-max", "filter-city"].forEach((id) => {
          const el = $(id);
          if (el) el.value = "";
        });
        ["filter-beds", "filter-status"].forEach((id) => {
          const el = $(id);
          if (el) el.selectedIndex = 0;
        });
        document.querySelectorAll(".filter-type:checked").forEach((
          cb,
        ) => cb.checked = false);
        state.page = 1;
        fetchProperties();
      }

      // --- API ---

      async function fetchProperties() {
        if (!state.properties.length) {
          state.loading = true;
          renderGrid();
        }

        const params = new URLSearchParams();
        params.set("_sort", state.sort);
        params.set("_limit", String(state.perPage));
        params.set("_offset", String((state.page - 1) * state.perPage));

        const minPrice = $("filter-min")?.value;
        const maxPrice = $("filter-max")?.value;
        const beds = $("filter-beds")?.value;
        const city = $("filter-city")?.value;
        const status = $("filter-status")?.value;

        if (minPrice) params.set("price__gte", minPrice);
        if (maxPrice) params.set("price__lte", maxPrice);
        if (beds) params.set("bedrooms__gte", beds);
        if (city) params.set("city__ilike", `%${city}%`);
        if (status) params.set("status__eq", status);

        const types = [];
        document.querySelectorAll(".filter-type:checked").forEach(
          (cb) => types.push(cb.value),
        );
        if (types.length === 1) {
          params.set("property_type__eq", types[0]);
        } else if (types.length > 1) {
          params.set("property_type__in", JSON.stringify(types));
        }

        if (state.showFavoritesOnly) {
          const favIds = [...state.favorites.keys()];
          if (favIds.length === 0) {
            state.properties = [];
            state.total = 0;
            state.loading = false;
            renderGrid();
            renderCount();
            return;
          }
          params.set("id__in", JSON.stringify(favIds));
        }

        try {
          const res = await fetch(
            `${API_BASE}/v1/properties?${params}`,
            { headers: headers(!!state.apiKey) },
          );
          const json = await res.json();
          state.properties = json.data || [];
          state.total = json.meta?.total ?? state.properties.length;
        } catch (e) {
          state.properties = [];
          state.total = 0;
        }

        state.loading = false;
        renderGrid();
        renderCount();
      }

      async function loadFavorites() {
        if (!state.apiKey) return;
        try {
          const res = await fetch(
            `${API_BASE}/v1/favorites?include=property`,
            { headers: headers(true) },
          );
          if (!res.ok) return;
          const json = await res.json();
          state.favorites.clear();
          (json.data || []).forEach((f) =>
            state.favorites.set(f.attributes.property_id, f.id)
          );
        } catch (e) {
          console.error("[Favorites] Load error:", e);
        }
        renderAuth();
        renderGrid();
      }

      const _favInFlight = new Set();
      async function toggleFavorite(propertyId) {
        if (!state.apiKey || _favInFlight.has(propertyId)) return;
        _favInFlight.add(propertyId);
        try {
          if (state.favorites.has(propertyId)) {
            const favId = state.favorites.get(propertyId);
            const res = await fetch(
              `${API_BASE}/v1/favorites/${favId}`,
              {
                method: "DELETE",
                headers: headers(true),
              },
            );
            if (res.ok) {
              state.favorites.delete(propertyId);
            } else {
              console.error("Failed to delete favorite:", res.status);
            }
          } else {
            const res = await fetch(`${API_BASE}/v1/favorites`, {
              method: "POST",
              headers: headers(true),
              body: JSON.stringify({ property_id: propertyId }),
            });
            if (res.ok) {
              const json = await res.json();
              state.favorites.set(propertyId, json.data.id);
            } else {
              console.error("Failed to add favorite:", res.status);
            }
          }
          renderAuth();
          if (state.showFavoritesOnly) {
            fetchProperties();
          } else {
            renderGrid();
          }
        } finally {
          _favInFlight.delete(propertyId);
        }
      }

      function toggleFavoritesFilter() {
        state.showFavoritesOnly = !state.showFavoritesOnly;
        state.page = 1;
        fetchProperties();
        renderAuth();
      }

      // --- SSE ---

      function connectSSE() {
        if (state.sseAbort) state.sseAbort.abort();
        if (!state.apiKey) return;

        const ctrl = new AbortController();
        state.sseAbort = ctrl;

        console.log("[SSE] Connecting to properties stream...");
        fetch(
          `${API_BASE}/v1/properties/stream?events=created,updated`,
          {
            headers: { "Authorization": `Bearer ${state.apiKey}` },
            signal: ctrl.signal,
          },
        ).then((res) => {
          if (!res.ok) {
            console.error(
              "[SSE] Connection failed:",
              res.status,
              res.statusText,
            );
            return res.text().then((t) =>
              console.error("[SSE] Response:", t)
            );
          }
          if (!res.body) {
            console.error("[SSE] No response body");
            return;
          }
          console.log("[SSE] Connected, reading stream...");
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          function read() {
            reader.read().then(({ done, value }) => {
              if (done) {
                console.log("[SSE] Stream ended");
                return;
              }
              buffer += decoder.decode(value, { stream: true });
              const parts = buffer.split("\n\n");
              buffer = parts.pop();

              parts.forEach((block) => {
                let eventType = "", data = "";
                block.split("\n").forEach((line) => {
                  if (line.startsWith("event:")) {
                    eventType = line.slice(6).trim();
                  }
                  if (line.startsWith("data:")) {
                    data = line.slice(5).trim();
                  }
                });
                if (eventType && data) {
                  console.log("[SSE] Event:", eventType);
                  try {
                    const parsed = JSON.parse(data);
                    addEvent(eventType, parsed);
                  } catch (e) {
                    console.error("[SSE] Parse error:", e);
                  }
                }
              });
              read();
            }).catch((e) => {
              if (e.name !== "AbortError") {
                console.error("[SSE] Read error:", e);
              }
            });
          }
          read();
        }).catch((e) => {
          if (e.name !== "AbortError") {
            console.error("[SSE] Fetch error:", e);
          }
        });
      }

      function addEvent(type, payload) {
        const rec = payload.new || payload.old || {};
        const label = type.includes("created")
          ? "New"
          : type.includes("updated")
          ? "Updated"
          : "Sold";
        const ev = {
          id: Date.now() + Math.random(),
          label,
          title: rec.title || "Property",
          price: rec.price,
          time: new Date(),
        };

        state.events.unshift(ev);
        if (state.events.length > 5) {
          state.events = state.events.slice(0, 5);
        }
        renderEvents();

        setTimeout(() => {
          const el = document.querySelector(
            `[data-event-id="${ev.id}"]`,
          );
          if (el) {
            el.classList.add("event-exit");
            el.addEventListener("animationend", () => {
              state.events = state.events.filter((e) => e.id !== ev.id);
              renderEvents();
            });
          }
        }, 10000);

        if (type.includes("created") || type.includes("updated")) {
          debouncedFetch();
        }
      }

      let _fetchTimer = 0;
      function debouncedFetch() {
        clearTimeout(_fetchTimer);
        _fetchTimer = setTimeout(fetchProperties, 500);
      }

      // --- Auth ---

      async function login() {
        if (state.loginLoading) return;
        const email = $("login-email").value.trim();
        const password = $("login-password").value.trim();
        if (!email || !password) return;

        state.loginError = "";
        state.loginLoading = true;
        renderAuth();

        try {
          const res = await fetch(`${API_BASE}/api/auth/token`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            state.loginError = err.message ||
              "Invalid email or password";
            state.loginLoading = false;
            renderAuth();
            return;
          }

          const data = await res.json();
          const token = data.token;
          const name = data.user?.name || data.user?.email || email;

          state.apiKey = token;
          state.userName = name;
          state.connected = true;
          state.loginLoading = false;
          state.loginError = "";
          localStorage.setItem("snaapi_homes_key", token);
          localStorage.setItem("snaapi_homes_user", name);
          renderAuth();
          loadFavorites();
          connectSSE();
          renderGrid();
        } catch (e) {
          state.loginError =
            "Connection failed. Is the server running?";
          state.loginLoading = false;
          renderAuth();
        }
      }

      function disconnect() {
        state.apiKey = "";
        state.userName = "";
        state.connected = false;
        state.favorites.clear();
        state.showFavoritesOnly = false;
        localStorage.removeItem("snaapi_homes_key");
        localStorage.removeItem("snaapi_homes_user");
        // Clear all cookies
        document.cookie.split(";").forEach((c) => {
          const name = c.split("=")[0].trim();
          document.cookie = name +
            "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
        });
        if (state.sseAbort) state.sseAbort.abort();
        state.sseAbort = null;
        state.events = [];
        renderAuth();
        renderGrid();
        renderEvents();
      }

      // --- Rendering ---

      function renderAuth() {
        if (state.connected) {
          const favCount = state.favorites.size;
          const favActive = state.showFavoritesOnly;
          $("auth-section").innerHTML =
            `<div class="flex items-center gap-3">
            <span class="flex items-center gap-1.5 text-sm text-stone-700">
              <span class="w-2 h-2 rounded-full bg-emerald-500 inline-block pulse-live"></span>
              ${esc(state.userName)}
            </span>
            <button onclick="toggleFavoritesFilter()" class="flex items-center gap-1 px-2.5 py-1.5 rounded-lg text-sm transition-colors ${
              favActive
                ? "bg-red-50 text-red-600"
                : "text-stone-500 hover:text-red-500 hover:bg-stone-50"
            }" aria-label="Filter favorites">
              <svg class="w-4 h-4" fill="${
              favActive ? "currentColor" : "none"
            }" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
              <span class="font-medium">${favCount}</span>
            </button>
            <button onclick="disconnect()" class="px-2.5 py-1.5 text-sm text-stone-500 hover:text-stone-700 hover:bg-stone-100 rounded-md transition-colors">Sign out</button>
          </div>`;
        } else {
          const errHtml = state.loginError
            ? `<p class="text-xs text-red-500 mt-1" role="alert">${
              esc(state.loginError)
            }</p>`
            : "";
          $("auth-section").innerHTML = `<div>
            <form onsubmit="event.preventDefault(); login();" class="flex items-center gap-2 flex-wrap">
              <input id="login-email" type="email" placeholder="Email" required aria-label="Email"
                class="flex-1 min-w-[120px] px-3 py-1.5 text-sm border border-stone-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-400">
              <input id="login-password" type="password" placeholder="Password" required aria-label="Password"
                class="flex-1 min-w-[100px] px-3 py-1.5 text-sm border border-stone-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-400">
              <button type="submit" ${
            state.loginLoading ? "disabled" : ""
          }
                class="px-3.5 py-1.5 text-sm font-medium bg-amber-500 text-white rounded-lg hover:bg-amber-600 transition-colors disabled:opacity-50 whitespace-nowrap">
                ${state.loginLoading ? "Signing in..." : "Sign in"}
              </button>
            </form>
            ${errHtml}
          </div>`;
          requestAnimationFrame(() => {
            const el = $("login-email");
            if (el && !state.loginLoading) el.focus();
          });
        }
      }

      function totalPages() {
        return Math.max(1, Math.ceil(state.total / state.perPage));
      }

      function goToPage(p) {
        state.page = Math.max(1, Math.min(p, totalPages()));
        fetchProperties();
      }

      function changePerPage(val) {
        state.perPage = Number(val);
        state.page = 1;
        fetchProperties();
      }

      function changeSort(val) {
        state.sort = val;
        state.page = 1;
        fetchProperties();
      }

      function renderCount() {
        const tp = totalPages();
        const start = state.total === 0
          ? 0
          : (state.page - 1) * state.perPage + 1;
        const end = Math.min(state.page * state.perPage, state.total);
        $("results-count").innerHTML =
          `<div class="flex items-center justify-between flex-wrap gap-2">
          <span class="text-sm font-medium text-stone-700 tabular-nums">${start}–${end} of ${state.total} propert${
            state.total === 1 ? "y" : "ies"
          }</span>
          <div class="flex items-center gap-3">
            <div class="flex items-center gap-1 text-sm text-stone-500">
              <span class="hidden sm:inline">Sort by</span>
              <select onchange="changeSort(this.value)" class="h-8 px-1.5 text-sm border border-stone-200 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-amber-400/40 transition-colors">
                ${
            [
              ["-price", "Price: High → Low"],
              ["price", "Price: Low → High"],
              ["-bedrooms", "Beds: Most"],
              ["bedrooms", "Beds: Fewest"],
              ["-sqft", "Size: Largest"],
              ["sqft", "Size: Smallest"],
              ["-created_at", "Newest Listed"],
              ["created_at", "Oldest Listed"],
            ].map(([val, label]) =>
              `<option value="${val}" ${
                val === state.sort ? "selected" : ""
              }>${label}</option>`
            ).join("")
          }
              </select>
            </div>
            <div class="flex items-center gap-1 text-sm text-stone-500">
              <span class="hidden sm:inline">Show</span>
              <select onchange="changePerPage(this.value)" class="h-8 px-1.5 text-sm border border-stone-200 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-amber-400/40 transition-colors">
                ${
            [5, 10, 20, 50, 100].map((n) =>
              `<option value="${n}" ${
                n === state.perPage ? "selected" : ""
              }>${n}</option>`
            ).join("")
          }
              </select>
              <span class="hidden sm:inline">per page</span>
            </div>
            <div class="flex items-center gap-1.5">
              <button onclick="goToPage(state.page - 1)" ${
            state.page <= 1 ? "disabled" : ""
          }
                class="h-11 w-11 sm:h-8 sm:w-8 flex items-center justify-center rounded-md border border-stone-200 text-sm text-stone-600 hover:bg-stone-50 disabled:opacity-30 disabled:pointer-events-none transition-colors">&lsaquo;</button>
              <span class="text-sm text-stone-600 px-1 tabular-nums">${state.page} / ${tp}</span>
              <button onclick="goToPage(state.page + 1)" ${
            state.page >= tp ? "disabled" : ""
          }
                class="h-11 w-11 sm:h-8 sm:w-8 flex items-center justify-center rounded-md border border-stone-200 text-sm text-stone-600 hover:bg-stone-50 disabled:opacity-30 disabled:pointer-events-none transition-colors">&rsaquo;</button>
            </div>
          </div>
        </div>`;
      }

      const skeletonCard = {
        html:
          `<div class="bg-white rounded-xl overflow-hidden border border-stone-100">
    <div class="relative">
      <div class="skeleton aspect-[4/3] w-full"></div>
      <div class="absolute bottom-3 left-3 skeleton h-5 w-16 rounded-full"></div>
    </div>
    <div class="p-4 space-y-3">
      <div class="skeleton h-4 w-3/4 rounded"></div>
      <div class="skeleton h-5 w-24 rounded"></div>
      <div class="skeleton h-4 w-full rounded"></div>
    </div>
  </div>`,
      };

      function propertyCard(item, index = 0) {
        const a = item.attributes;
        const isFav = state.favorites.has(item.id);
        const img = a.image_url
          ? `<img src="${esc(a.image_url)}" alt="${
            esc(a.title)
          }" class="w-full aspect-[4/3] object-cover" loading="lazy">`
          : `<div class="w-full aspect-[4/3] bg-stone-100 flex items-center justify-center">
        <svg class="w-12 h-12 text-stone-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
      </div>`;

        const statusBadge = a.status === "active"
          ? '<span class="text-xs font-medium px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-700 ring-1 ring-black/5">Active</span>'
          : a.status === "pending"
          ? '<span class="text-xs font-medium px-2 py-0.5 rounded-full bg-amber-50 text-amber-700 ring-1 ring-black/5">Pending</span>'
          : '<span class="text-xs font-medium px-2 py-0.5 rounded-full bg-stone-100 text-stone-600 ring-1 ring-black/5">Sold</span>';

        const heartBtn = state.connected
          ? `<button onclick='event.stopPropagation(); toggleFavorite(${
            JSON.stringify(item.id)
          })' class="absolute top-3 right-3 w-9 h-9 flex items-center justify-center rounded-full bg-white/90 hover:bg-white shadow-sm transition-colors ${
            isFav ? "heart-pop" : ""
          }" aria-label="${isFav ? "Remove from" : "Add to"} favorites">
        <svg class="w-5 h-5 ${
            isFav ? "text-red-500 fill-red-500" : "text-stone-400"
          }" fill="${
            isFav ? "currentColor" : "none"
          }" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
      </button>`
          : "";

        const delay = Math.min(index * 40, 300);
        return `<div class="card-enter bg-white rounded-xl overflow-hidden border border-stone-100 hover:shadow-lg hover:-translate-y-0.5 transition-[box-shadow,transform] duration-200" style="animation-delay:${delay}ms">
    <div class="relative">${img}${heartBtn}
      <div class="absolute bottom-3 left-3">${statusBadge}</div>
    </div>
    <div class="p-4 space-y-2">
      <h3 class="font-display text-sm font-medium text-stone-800 truncate">${
          esc(a.title)
        }</h3>
      <p class="font-display text-lg font-bold text-stone-900 tabular-nums">${
          fmt(a.price)
        }</p>
      <div class="flex items-center gap-3 text-sm text-stone-500 tabular-nums">
        <span>${
          esc(a.bedrooms)
        } bd</span><span class="text-stone-300">&middot;</span>
        <span>${
          esc(a.bathrooms)
        } ba</span><span class="text-stone-300">&middot;</span>
        <span>${
          a.sqft ? Number(a.sqft).toLocaleString() + " sqft" : "--"
        }</span>
      </div>
      <p class="text-xs text-stone-500 line-clamp-2">${
          esc(a.address)
        }, ${esc(a.city)}, ${esc(a.state)} ${esc(a.zip_code)}</p>
      ${
          a.agent_name
            ? `<p class="text-xs text-stone-500">${
              esc(a.agent_name)
            }</p>`
            : ""
        }
    </div>
  </div>`;
      }

      function renderGrid() {
        const grid = $("property-grid");
        const houseIcon =
          `<svg class="w-16 h-16 text-stone-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>`;
        if (!state.connected) {
          grid.innerHTML =
            `<div class="col-span-full py-20 text-center">${houseIcon}<p class="font-display text-base font-medium text-stone-500">Your next home is waiting</p><p class="mt-1 text-sm text-stone-400">Sign in above to browse listings, save favorites, and see live updates.</p></div>`;
          return;
        }
        if (state.loading) {
          grid.innerHTML = Array(6).fill(skeletonCard.html).join("");
          return;
        }
        if (!state.properties.length) {
          const searchIcon =
            `<svg class="w-16 h-16 text-stone-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>`;
          const heading = state.showFavoritesOnly
            ? "No favorites yet"
            : "No properties match";
          const sub = state.showFavoritesOnly
            ? "Heart a few listings and they'll show up here."
            : "Try broadening your search or clearing filters.";
          grid.innerHTML =
            `<div class="col-span-full py-20 text-center">${searchIcon}<p class="font-display text-base font-medium text-stone-500">${heading}</p><p class="mt-1 text-sm text-stone-400">${sub}</p></div>`;
          return;
        }
        grid.innerHTML = state.properties.map((item, i) =>
          propertyCard(item, i)
        ).join("");
      }

      function dismissEvent(id) {
        const el = document.querySelector(`[data-event-id="${id}"]`);
        if (el) {
          el.classList.add("event-exit");
          el.addEventListener("animationend", () => {
            state.events = state.events.filter((e) => e.id !== id);
            renderEvents();
          });
        }
      }

      function renderEvents() {
        const container = $("event-feed");
        container.innerHTML = state.events.map((ev) => {
          const colors = ev.label === "New"
            ? "bg-emerald-600"
            : ev.label === "Updated"
            ? "bg-amber-600"
            : "bg-stone-600";
          return `<div data-event-id="${ev.id}" class="event-enter flex items-start gap-3 px-4 py-3 bg-white rounded-lg shadow-lg border border-stone-100 max-w-[280px] sm:max-w-xs" role="status">
      <span class="shrink-0 mt-0.5 text-xs font-semibold text-white px-2 py-0.5 rounded ${colors}">${
            esc(ev.label)
          }</span>
      <div class="min-w-0 flex-1">
        <p class="font-display text-sm font-medium text-stone-800 truncate">${
            esc(ev.title)
          }</p>
        <p class="text-xs text-stone-500">${
            ev.price ? fmt(ev.price) : ""
          } &middot; ${timeSince(ev.time)}</p>
      </div>
      <button onclick="dismissEvent(${ev.id})" class="shrink-0 mt-0.5 w-5 h-5 flex items-center justify-center rounded text-stone-400 hover:text-stone-600 hover:bg-stone-100 transition-colors" aria-label="Dismiss">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>`;
        }).join("");
      }

      // --- Init ---

      document.addEventListener("DOMContentLoaded", () => {
        console.log(
          "%cSnaapi Homes",
          "font-size:1.5em;font-weight:bold;color:#d97706",
          "\nThis demo is powered by Snaapi — automatic APIs, real-time events, and role-based access with no coding required.",
          "\nhttps://snaapi.dev",
        );
        if (state.apiKey) {
          state.connected = true;
          state.loading = true;
        } else {
          state.loading = false;
        }
        renderAuth();
        renderGrid();
        if (state.connected) {
          fetchProperties();
          loadFavorites();
          connectSSE();
        }
      });
    </script>

    <!-- Header -->
    <header class="bg-white border-b border-stone-100">
      <div
        class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between"
      >
        <div class="flex items-center gap-1.5">
          <svg
            style="height: 2.4rem"
            viewBox="0 0 1400 570"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              fill="none"
              stroke="#fbbf24"
              stroke-width="60"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M 105 338 L 315 338 L 105 518"
            />
            <path
              fill="none"
              stroke="#f59e0b"
              stroke-width="60"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M 315 53 L 105.000008 233 L 315 233"
            />
            <text
              x="420"
              y="379"
              font-family="Outfit, Inter, system-ui, sans-serif"
              font-size="288"
              font-weight="600"
              fill="#1c1917"
            >
              Snaapi
            </text>
          </svg>
          <span
            class="font-display text-lg font-bold tracking-tight text-stone-900"
          >Homes</span>
        </div>
        <div id="auth-section"></div>
      </div>
    </header>

    <!-- Filters -->
    <div class="bg-stone-50/80 border-b border-stone-200 shadow-sm">
      <form
        onsubmit="event.preventDefault(); state.page = 1; fetchProperties();"
        class="max-w-7xl mx-auto px-4 sm:px-6 py-2.5"
      >
        <!-- Mobile: toggle button -->
        <div class="flex items-center justify-between lg:hidden">
          <button
            type="button"
            onclick="document.getElementById('filter-panel').classList.toggle('hidden')"
            class="flex items-center gap-2 h-9 px-3 text-sm font-medium text-stone-600 border border-stone-200 rounded-md hover:bg-stone-50 transition-colors"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"
              />
            </svg>
            Filters
          </button>
          <button
            type="submit"
            class="h-9 px-5 text-sm font-medium bg-amber-500 text-white rounded-md hover:bg-amber-600 transition-colors"
          >
            Search
          </button>
        </div>

        <!-- Collapsible on mobile, always visible on desktop -->
        <div id="filter-panel" class="hidden lg:!block mt-3 lg:mt-0">
          <div class="grid grid-cols-2 lg:flex items-end gap-3">
            <div class="lg:flex-1 lg:min-w-0">
              <label
                for="filter-min"
                class="block text-xs font-medium text-stone-500 mb-1.5"
              >Price min</label>
              <input
                id="filter-min"
                type="number"
                placeholder="0"
                class="w-full h-9 px-3 text-sm border border-stone-200 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-amber-400/40 focus:border-amber-400 transition-colors"
              >
            </div>
            <div class="lg:flex-1 lg:min-w-0">
              <label
                for="filter-max"
                class="block text-xs font-medium text-stone-500 mb-1.5"
              >Price max</label>
              <input
                id="filter-max"
                type="number"
                placeholder="Any"
                class="w-full h-9 px-3 text-sm border border-stone-200 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-amber-400/40 focus:border-amber-400 transition-colors"
              >
            </div>
            <div class="lg:shrink-0 lg:w-16">
              <label
                for="filter-beds"
                class="block text-xs font-medium text-stone-500 mb-1.5"
              >Beds</label>
              <select
                id="filter-beds"
                class="w-full h-9 px-2 text-sm border border-stone-200 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-amber-400/40 focus:border-amber-400 transition-colors"
              >
                <option value="">Any</option>
                <option value="1">1+</option>
                <option value="2">2+</option>
                <option value="3">3+</option>
                <option value="4">4+</option>
              </select>
            </div>
            <div class="col-span-2 lg:min-w-0">
              <label class="block text-xs font-medium text-stone-500 mb-1.5"
              >Type</label>
              <div
                class="flex items-center gap-3 flex-wrap lg:flex-nowrap lg:h-9 lg:px-3 lg:border lg:border-stone-200 lg:rounded-md lg:bg-white"
              >
                <label
                  class="flex items-center gap-1.5 text-sm text-stone-600 cursor-pointer whitespace-nowrap"
                >
                  <input
                    type="checkbox"
                    value="house"
                    class="filter-type w-4 h-4 rounded border-stone-300 text-amber-500 focus:ring-amber-400/40"
                  >House
                </label>
                <label
                  class="flex items-center gap-1.5 text-sm text-stone-600 cursor-pointer whitespace-nowrap"
                >
                  <input
                    type="checkbox"
                    value="condo"
                    class="filter-type w-4 h-4 rounded border-stone-300 text-amber-500 focus:ring-amber-400/40"
                  >Condo
                </label>
                <label
                  class="flex items-center gap-1.5 text-sm text-stone-600 cursor-pointer whitespace-nowrap"
                >
                  <input
                    type="checkbox"
                    value="townhouse"
                    class="filter-type w-4 h-4 rounded border-stone-300 text-amber-500 focus:ring-amber-400/40"
                  >Town
                </label>
                <label
                  class="flex items-center gap-1.5 text-sm text-stone-600 cursor-pointer whitespace-nowrap"
                >
                  <input
                    type="checkbox"
                    value="apartment"
                    class="filter-type w-4 h-4 rounded border-stone-300 text-amber-500 focus:ring-amber-400/40"
                  >Apt
                </label>
              </div>
            </div>
            <div class="col-span-2 lg:flex-1 lg:min-w-0">
              <label
                for="filter-city"
                class="block text-xs font-medium text-stone-500 mb-1.5"
              >City</label>
              <input
                id="filter-city"
                type="text"
                placeholder="Search city"
                class="w-full h-9 px-3 text-sm border border-stone-200 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-amber-400/40 focus:border-amber-400 transition-colors"
              >
            </div>
            <div class="flex-1 min-w-0">
              <label
                for="filter-status"
                class="block text-xs font-medium text-stone-500 mb-1.5"
              >Status</label>
              <select
                id="filter-status"
                class="w-full h-9 px-3 text-sm border border-stone-200 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-amber-400/40 focus:border-amber-400 transition-colors"
              >
                <option value="">Any</option>
                <option value="active" selected>Active</option>
                <option value="pending">Pending</option>
                <option value="sold">Sold</option>
              </select>
            </div>
            <div
              class="col-span-2 lg:shrink-0 flex items-end gap-2 justify-end lg:justify-start"
            >
              <button
                type="submit"
                class="h-9 px-5 text-sm font-medium bg-amber-500 text-white rounded-md hover:bg-amber-600 transition-colors whitespace-nowrap"
              >
                Search
              </button>
              <button
                type="button"
                onclick="clearFilters()"
                class="h-9 text-sm text-stone-500 hover:text-stone-700 underline underline-offset-2 whitespace-nowrap"
              >
                Clear
              </button>
            </div>
          </div>
        </div>
      </form>
    </div>

    <!-- Main -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 py-6">
      <p
        id="results-count"
        class="text-sm text-stone-500 mb-4"
        aria-live="polite"
      >
      </p>
      <div
        id="property-grid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"
      >
      </div>
    </main>

    <!-- Footer -->
    <footer class="py-6 text-center text-xs text-stone-400">
      Powered by <a
        href="https://snaapi.dev"
        class="text-amber-600 hover:text-amber-700 font-medium"
      >Snaapi</a>
    </footer>

    <!-- Event Feed -->
    <div
      id="event-feed"
      aria-live="polite"
      class="fixed bottom-3 right-3 sm:bottom-4 sm:right-4 flex flex-col gap-2.5 z-50 pointer-events-none *:pointer-events-auto"
    >
    </div>
  </body>
</html>
